name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Debug file listing
        run: |
          echo "=== PWD ==="
          pwd
          echo "=== LS ==="
          ls -la
          echo "=== SiteConfig.yaml ==="
          cat SiteConfig.yaml
          echo "=== Content ==="
          find Content -type f

      - name: Build site
        run: swift run Site build 2>&1 || swift run -c release Site build

      - name: Fix asset paths for GitHub Pages project site
        run: |
          # SiteKit generates absolute paths from root (/assets/...) but GitHub Pages
          # project sites serve from /nfc-cool-blog/. Rewrite all absolute paths.
          # This hack can be removed once blog.nfc.cool DNS is configured.
          find _Site -name '*.html' -exec sed -i \
            -e 's|href="/assets/|href="/nfc-cool-blog/assets/|g' \
            -e 's|src="/assets/|src="/nfc-cool-blog/assets/|g' \
            -e 's|href="/blog/|href="/nfc-cool-blog/blog/|g' \
            -e 's|href="/about/|href="/nfc-cool-blog/about/|g' \
            -e 's|href="/tags/|href="/nfc-cool-blog/tags/|g' \
            -e 's|href="/feed\.|href="/nfc-cool-blog/feed.|g' \
            {} +

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_Site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
