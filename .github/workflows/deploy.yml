name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Debug file listing
        run: |
          echo "=== PWD ==="
          pwd
          echo "=== LS ==="
          ls -la
          echo "=== SiteConfig.yaml ==="
          cat SiteConfig.yaml
          echo "=== Content ==="
          find Content -type f

      - name: Build site
        run: swift run Site build 2>&1 || swift run -c release Site build

      - name: SEO fix — add aria-labels to empty anchor tags
        run: |
          python3 << 'PYEOF'
          import re, glob, html as htmlmod
          for f in glob.glob("_Site/**/*.html", recursive=True):
            with open(f, "r") as fh:
              content = fh.read()
            original = content
            # Fix empty sk-post-link anchors
            def add_aria(m):
              tag = m.group(0)
              rest = content[m.end():m.end()+500]
              title_m = re.search(r'<h2[^>]*>(.*?)</h2>', rest, re.DOTALL)
              if title_m:
                title = re.sub(r'<[^>]+>', '', title_m.group(1)).strip()
                title = htmlmod.escape(title)
                return tag.replace('class="sk-post-link"', f'class="sk-post-link" aria-label="Read: {title}"')
              return tag
            content = re.sub(r'<a class="sk-post-link" href="[^"]*"></a>', add_aria, content)
            # Fix logo link
            if 'sk-site-logo' in content and 'aria-label' not in content.split('sk-site-logo')[0][-50:]:
              content = content.replace('class="sk-site-logo"', 'class="sk-site-logo" aria-label="NFC.cool Blog Home"')
            # Add favicon and apple-touch-icon
            icon_tags = '<link rel="icon" type="image/png" href="/assets/favicon.png"/><link rel="apple-touch-icon" href="/assets/apple-touch-icon.png"/>'
            if '<link rel="icon"' not in content and '<link rel="apple-touch-icon"' not in content:
              content = content.replace('</head>', icon_tags + '</head>')
            if content != original:
              with open(f, "w") as fh:
                fh.write(content)
              print(f"Fixed: {f}")
          PYEOF

      - name: Fix asset paths for GitHub Pages project site
        run: |
          # SiteKit generates absolute paths from root (/assets/...) but GitHub Pages
          # project sites serve from /nfc-cool-blog/. Rewrite all absolute paths.
          # This hack can be removed once blog.nfc.cool DNS is configured.
          # Rewrite ALL absolute paths starting with / to include the project prefix.
          # This covers assets, pages, links, images, scripts, feeds, and JSON refs.
          find _Site -name '*.html' -o -name '*.xml' -o -name '*.json' | xargs sed -i \
            -e 's|href="/|href="/nfc-cool-blog/|g' \
            -e 's|src="/|src="/nfc-cool-blog/|g' \
            -e 's|url("/|url("/nfc-cool-blog/|g' \
            -e 's|content="/|content="/nfc-cool-blog/|g'
          # Fix double-prefixed external URLs (https:// got caught)
          find _Site -name '*.html' -o -name '*.xml' -o -name '*.json' | xargs sed -i \
            -e 's|href="https:/nfc-cool-blog/|href="https://|g' \
            -e 's|src="https:/nfc-cool-blog/|src="https://|g' \
            -e 's|content="https:/nfc-cool-blog/|content="https://|g' \
            -e 's|href="http:/nfc-cool-blog/|href="http://|g'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_Site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
