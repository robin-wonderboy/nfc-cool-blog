name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private dependencies
        run: git config --global url."https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Install rsvg-convert (for favicon generation)
        run: sudo apt-get install -y librsvg2-bin

      - name: Build site
        run: swift run Site build 2>&1 || swift run -c release Site build

      - name: Generate favicon PNGs (sips not available on Linux)
        run: |
          apt-get list --installed 2>/dev/null | grep imagemagick || sudo apt-get install -y imagemagick
          convert Theme/images/favicon.png -resize 180x180 _Site/apple-touch-icon.png
          convert Theme/images/favicon.png -resize 32x32 _Site/favicon-32x32.png

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_Site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
